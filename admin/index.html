<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Valley Admin Web</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./valley_admin_data.js"></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Valley Admin • Publicado</p>
        <h1>Painel Administrativo Persistente</h1>
      </div>
      <p class="status" id="publishedStatus">Ambiente pronto para operação</p>
    </header>

    <main>
      <section id="homeView" class="view active" aria-label="Página inicial do administrador">
        <div class="panel">
          <h2>Resumo geral de desempenho do servidor</h2>
          <div id="serverSummary" class="kpi-grid"></div>
        </div>

        <div class="panel">
          <h2>Módulos</h2>
          <p class="muted">Clique em um botão para abrir as configurações do módulo.</p>
          <div id="moduleButtons" class="module-grid"></div>
        </div>
      </section>

      <section id="moduleView" class="view" aria-label="Configurações do módulo">
        <div class="module-header panel">
          <button id="backHome" type="button" class="back-btn">← Voltar para Home</button>
          <div>
            <h2 id="moduleTitle">Módulo</h2>
            <p id="moduleMeta" class="muted"></p>
          </div>
        </div>

        <div id="moduleContent"></div>
      </section>
    </main>
  </body>
</html>
