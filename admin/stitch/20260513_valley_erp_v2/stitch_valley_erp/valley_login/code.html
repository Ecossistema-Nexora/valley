</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface-variant block uppercase" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-lowest border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">

</button>
</div>
</div>

<input class="w-4 h-4 rounded border-outline text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="remember">Keep me signed in for 30 days</label>

<span class="material-symbols-outlined">arrow_forward</span>
</button>

<div class="relative my-8">
