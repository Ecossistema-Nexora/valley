developer_instructions = """
This Codex project is persistently bound to the GitHub repository Ecossistema-Nexora/valley.
When repository context is needed, use the origin remote https://github.com/Ecossistema-Nexora/valley.git as the canonical source.
Prefer operating from the repository root and keep Git operations aligned with origin unless the user explicitly requests a different remote or branch strategy.

Frontend layout policy:
- For new Valley front-end layout work, start from Stitch by Google as the primary AI design generator, using the workspace Stitch MCP server when authenticated.
- Use Figma as the design inspection and handoff layer through the official Figma MCP/VS Code extension.
- Do not commit Stitch, Figma, OAuth, or API secrets. Keep STITCH_API_KEY and related credentials local only.
- Flutter implementation must preserve the Valley brand tokens, ship responsive Web + Android surfaces, and keep the home screen modular with user-selectable visible modules plus a full module dock for access.

Mandatory END-USER-BUILD trigger:
- When the user invokes the exact term END-USER-BUILD, execute `powershell -NoProfile -ExecutionPolicy Bypass -File scripts\\invoke_end_user_build.ps1 -Mode release-final` before finalizing the turn.
- Ensure that the END-USER-BUILD process triggers the generation of all final artifacts, including web panels, Android APKs, Windows/Linux executables, and the updated PDF documentation.- Treat END-USER-BUILD as Production / Release Mode for end users: remove developer UI, log overlays, debug menus, inspector surfaces, and technical support floating buttons.
- Release builds must use `--release`, `--dart-define=VALLEY_END_USER_BUILD=true`, and `--dart-define=VALLEY_PRODUCT_API_BASE_URL=https://admin.brasildesconto.com.br`.
- In END-USER-BUILD work, APIs finais are the primary data source; bundled or mock data may remain only as fallback contingency.
- END-USER-BUILD must affect web panels, Android APK, Windows executable, Linux executable, updated PDF, and Telegram delivery of all final artifacts.

Mandatory MCP policy:
- Treat MCP_DOCKER, context7, figma, linear, and playwright as required Valley workspace capabilities.
- Keep MCP_DOCKER platform-managed; do not duplicate it as a repo-local endpoint.
- Keep context7, figma, linear, and playwright declared in .mcp.json, .vscode/mcp.json, and this Codex config.
- Keep OAuth tokens, API keys, browser storage state, and captured auth artifacts outside git.
- Use context7 for current library documentation, Figma for design handoff, Linear for tracked product work, and Playwright for browser validation when those capabilities are relevant.

Mandatory brand terminology:
- Product and ecosystem name is Valley.
- Assistant and AI-facing identity name is Helena.
- Token/currency name is V-Coin.
- Do not introduce product references to Nexora, persona, Nexus-ID, Nexora Pay, or $NEX.
- The only accepted Nexora string is the technical GitHub repository owner in Ecossistema-Nexora/valley while that remains the canonical remote.
"""

[features]
experimental_use_rmcp_client = true

[mcp_servers.figma]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.figma.com/mcp"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.context7.com/mcp/oauth"]

[mcp_servers.linear]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.linear.app/mcp"]

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--user-data-dir=tmp/runtime/playwright-mcp-profile", "--output-dir=tmp/runtime/playwright-mcp"]

[mcp_servers.terraform]
command = "powershell"
args = ["-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "scripts/start_terraform_mcp_server.ps1"]
