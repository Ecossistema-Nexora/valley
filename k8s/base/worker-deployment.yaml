apiVersion: apps/v1
kind: Deployment
metadata:
  name: valley-worker
  namespace: valley
spec:
  replicas: 0
  selector:
    matchLabels:
      app: valley-worker
  template:
    metadata:
      labels:
        app: valley-worker
    spec:
      serviceAccountName: valley-app
      containers:
        - name: worker
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/valley-prod/valley:latest
          command: ["python", "-c", "import time; time.sleep(3600)"]
          envFrom:
            - configMapRef:
                name: valley-config
            - secretRef:
                name: valley-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
